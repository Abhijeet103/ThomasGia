yesserver {
    listen 80;
    server_name mindmetric.store www.mindmetric.store;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name mindmetric.store www.mindmetric.store;

    ssl_certificate     /etc/letsencrypt/live/mindmetric.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mindmetric.store/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /static/ {
        alias /home/ec2-user/ThomasGia/staticfiles/;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}