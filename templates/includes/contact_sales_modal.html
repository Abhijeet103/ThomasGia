<div class="modal-shell" id="{{ modal_id }}" data-modal {% if request.GET.contact_sales != 'open' %}hidden{% endif %}>
    <a href="{{ contact_sales_close_url }}" class="modal-backdrop" data-modal-close aria-label="Close modal"></a>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="{{ modal_id }}-title">
        <a href="{{ contact_sales_close_url }}" class="modal-close" aria-label="Close" data-modal-close>&times;</a>
        <span class="kicker">Sales</span>
        <h2 id="{{ modal_id }}-title">{{ modal_title }}</h2>
        <p class="modal-copy">{{ modal_copy }}</p>
        <form method="post" action="{% url 'pages:contact-sales' %}" class="modal-form">
            {% csrf_token %}
            {{ contact_form.next }}
            {{ contact_form.source_page }}
            <div class="modal-form-grid">
                <label class="form-field">
                    <span>Contact email</span>
                    {{ contact_form.email }}
                </label>
                <label class="form-field">
                    <span>Contact phone</span>
                    {{ contact_form.phone }}
                </label>
                <label class="form-field form-field-wide">
                    <span>Ask anything</span>
                    {{ contact_form.message }}
                </label>
            </div>
            <div class="modal-actions">
                <button type="submit" class="button">Send inquiry</button>
            </div>
        </form>
    </div>
</div>
